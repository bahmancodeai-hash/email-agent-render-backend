services:
  postgres:
    image: postgres:16-alpine
    container_name: email-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_agent
      POSTGRES_USER: email_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_agent -d email_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: email-agent-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8000"
    expose:
      - "8000"
    mem_limit: 4g
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: email-agent-caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/namecheap/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./releases:/srv/downloads:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  caddy_data:
  caddy_config:
